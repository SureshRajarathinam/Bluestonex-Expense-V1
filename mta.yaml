_schema-version: "3.1"
ID: expense-management
description: BluestoneX Expense Reimbursement System
version: 1.0.0

# ─────────────────────────────────────────────────────────────────────────────
# MODULES
# ─────────────────────────────────────────────────────────────────────────────
modules:

  # ── CAP Node.js Backend ────────────────────────────────────────────────────
  - name: expense-management-srv
    type: nodejs
    path: gen/srv
    parameters:
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 512M
    build-parameters:
      builder: npm
    requires:
      - name: expense-management-db
      - name: expense-management-xsuaa
      - name: expense-management-ans
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}

  # ── HANA DB Deployer ───────────────────────────────────────────────────────
  - name: expense-management-db-deployer
    type: hdb
    path: gen/db
    parameters:
      buildpack: nodejs_buildpack
    requires:
      - name: expense-management-db

  # ── AppRouter ──────────────────────────────────────────────────────────────
  - name: expense-management-approuter
    type: approuter.nodejs
    path: approuter
    parameters:
      memory: 128M
      disk-quota: 256M
    requires:
      - name: srv-api
        group: destinations
        properties:
          name: expense-srv-api
          url: ~{srv-url}
          forwardAuthToken: true
      - name: expense-management-xsuaa
      - name: expense-management-html5-runtime
      - name: expense-management-destination
    provides:
      - name: app-api
        properties:
          app-url: ${default-url}

  # ── HTML5 App Content Deployer ─────────────────────────────────────────────
  - name: expense-management-app-deployer
    type: com.sap.application.content
    path: .
    requires:
      - name: expense-management-html5-host
        parameters:
          content-target: true
    build-parameters:
      build-result: app/
      requires:
        - name: expense-management-my-expenses
          artifacts: [ my-expenses.zip ]
          target-path: app/
        - name: expense-management-approvals
          artifacts: [ approvals.zip ]
          target-path: app/
        - name: expense-management-policy-config
          artifacts: [ policy-config.zip ]
          target-path: app/
        - name: expense-management-workflow-members
          artifacts: [ workflow-members.zip ]
          target-path: app/

  # ── Fiori App: My Expenses (Employee) ──────────────────────────────────────
  - name: expense-management-my-expenses
    type: html5
    path: app/my-expenses
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      supported-platforms: []

  # ── Fiori App: Approvals (Approver) ────────────────────────────────────────
  - name: expense-management-approvals
    type: html5
    path: app/approvals
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      supported-platforms: []

  # ── Fiori App: Policy Configuration (Admin) ────────────────────────────────
  - name: expense-management-policy-config
    type: html5
    path: app/policy-config
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      supported-platforms: []

  # ── Fiori App: Approval Workflow Members (Admin) ───────────────────────────
  - name: expense-management-workflow-members
    type: html5
    path: app/workflow-members
    build-parameters:
      build-result: dist
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      supported-platforms: []

  # ── Launchpad Content Deployer ─────────────────────────────────────────────
  - name: expense-management-launchpad-deployer
    type: com.sap.application.content
    path: .
    requires:
      - name: expense-management-launchpad
        parameters:
          content-target: true
          service-key:
            name: expense-management-launchpad-key
            config:
              content-endpoint: developer
    build-parameters:
      no-source: true
    parameters:
      content:
        instance:
          existing_destinations_policy: update
          destinations:
            - Name: expense-management-html5-host
              ServiceInstanceName: expense-management-html5-host
              ServiceKeyName: expense-management-html5-host-key
              app-host-id: ~{expense-management-html5-host/app-host-id}
            - Name: expense-management-srv-api
              Authentication: OAuth2UserTokenExchange
              TokenServiceInstanceName: expense-management-xsuaa
              TokenServiceKeyName: expense-management-xsuaa-key
              URL: ~{srv-api/srv-url}

# ─────────────────────────────────────────────────────────────────────────────
# RESOURCES (BTP Service Instances)
# ─────────────────────────────────────────────────────────────────────────────
resources:

  # ── HANA HDI Container ────────────────────────────────────────────────────
  - name: expense-management-db
    type: com.sap.xs.hdi-container
    parameters:
      service: hana
      service-plan: hdi-shared

  # ── XSUAA (Authentication & Authorization) ────────────────────────────────
  - name: expense-management-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json
      config:
        xsappname: expense-management-${org}-${space}
        tenant-mode: dedicated

  # ── Alert Notification Service (Email Notifications) ──────────────────────
  - name: expense-management-ans
    type: org.cloudfoundry.managed-service
    parameters:
      service: alert-notification
      service-plan: standard

  # ── HTML5 Application Repository (Host) ───────────────────────────────────
  - name: expense-management-html5-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host
    provides:
      - name: expense-management-html5-host
        properties:
          app-host-id: ${space-guid}

  # ── HTML5 Application Repository (Runtime) ────────────────────────────────
  - name: expense-management-html5-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime

  # ── Destination Service ───────────────────────────────────────────────────
  - name: expense-management-destination
    type: org.cloudfoundry.managed-service
    parameters:
      service: destination
      service-plan: lite

  # ── SAP Launchpad Service ─────────────────────────────────────────────────
  - name: expense-management-launchpad
    type: org.cloudfoundry.managed-service
    parameters:
      service: launchpad
      service-plan: standard
