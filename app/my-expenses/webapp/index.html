<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Expenses</title>
  <script id="sap-ui-bootstrap"
    src="https://ui5.sap.com/1.120/resources/sap-ui-core.js"
    data-sap-ui-theme="sap_horizon"
    data-sap-ui-resourceroots='{ "com.bluestonex.expense.myexpenses": "./" }'
    data-sap-ui-compatVersion="edge"
    data-sap-ui-async="true"
    data-sap-ui-appCacheBuster="./"
    data-sap-ui-frameOptions="allow">
  </script>
  <script>
    sap.ui.getCore().attachInit(function () {
      sap.ui.require(["sap/fe/core/AppComponent"], function (Component) {
        new sap.m.Shell({
          app: new sap.ui.core.ComponentContainer({
            height: "100%",
            settings: {
              id: "myexpenses",
              name: "com.bluestonex.expense.myexpenses",
              height: "100%"
            }
          })
        }).placeAt("content");
      });
    });
  </script>
</head>
<body class="sapUiBody" id="content"></body>
</html>
